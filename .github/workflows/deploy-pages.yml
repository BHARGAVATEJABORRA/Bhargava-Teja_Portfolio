name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Remove server-only code (Pages is static-only — no API, auth, or admin)
        run: rm -rf app/api app/admin app/login proxy.ts

      - name: Compute base path
        id: basepath
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/$REPO_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site
        run: npm run build
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          # Set this repo variable to your deployed spotify-endpoint URL
          # (see spotify-endpoint/README.md). Empty = widget shows idle state.
          NEXT_PUBLIC_SPOTIFY_ENDPOINT: ${{ vars.NEXT_PUBLIC_SPOTIFY_ENDPOINT }}

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
